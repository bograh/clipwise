name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev pkg-config build-essential \
            librsvg2-bin libfuse2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      # Rename so the download filename is unambiguous
      - name: Stage binary
        run: cp target/release/clipwise clipwise-linux-x86_64

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Convert SVG icon to PNG
        run: rsvg-convert -w 256 -h 256 assets/clipwise.svg -o clipwise.png

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          VERSION: ${{ github.ref_name }}
          ARCH: x86_64
        run: |
          mkdir -p AppDir/usr/bin
          cp target/release/clipwise AppDir/usr/bin/clipwise

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file assets/clipwise.desktop \
            --icon-file clipwise.png \
            --output appimage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Clipwise ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            clipwise-linux-x86_64
            Clipwise-*.AppImage
          body: |
            ## Download

            | File | Description |
            |---|---|
            | `Clipwise-*.AppImage` | **Recommended** — portable, no system dependencies |
            | `clipwise-linux-x86_64` | Raw binary — requires libxcb + libwayland on the system |

            ## Run the AppImage

            ```bash
            chmod +x Clipwise-*.AppImage
            ./Clipwise-*.AppImage
            ```

            ## Run the raw binary

            ```bash
            chmod +x clipwise-linux-x86_64
            mv clipwise-linux-x86_64 ~/.local/bin/clipwise
            clipwise
            ```
